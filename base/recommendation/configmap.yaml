apiVersion: v1
kind: ConfigMap
metadata:
  name: recommendationservice-config
data:
  OTEL_SERVICE_NAME: "recommendationservice"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-demo-otelcol:4317"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=recommendationservice,service.namespace=opentelemetry-demo,service.version=1.12.0"
  RECOMMENDATION_SERVICE_PORT: "8080"
  PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:8080"
  OTEL_PYTHON_LOG_CORRELATION: "true"
  PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION: "python"
  FLAGD_HOST: "flagd"
  FLAGD_PORT: "8013"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-demo-otelcol
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opentelemetry-demo-otelcol
  template:
    metadata:
      labels:
        app: opentelemetry-demo-otelcol
    spec:
      containers:
        - name: otelcol
          image: otel/opentelemetry-collector-contrib:latest
          args:
            - --config=/etc/otelcol/otelcol-config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
      volumes:
        - name: config
          configMap:
            name: opentelemetry-demo-otelcol-config
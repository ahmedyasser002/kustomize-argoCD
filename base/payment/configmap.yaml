apiVersion: v1
kind: ConfigMap
metadata:
  name: paymentservice-config
data:
  OTEL_SERVICE_NAME: "paymentservice"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-demo-otelcol:4317"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=paymentservice,service.namespace=opentelemetry-demo,service.version=1.12.0"
  PAYMENT_SERVICE_PORT: "8080"
  FLAGD_HOST: "flagd"
  FLAGD_PORT: "8013"
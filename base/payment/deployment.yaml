apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
  labels:
    app: paymentservice
    app.kubernetes.io/version: "1.12.0"
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: paymentservice
  template:
    metadata:
      labels:
        app: paymentservice
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: paymentservice
          image: ghcr.io/open-telemetry/demo:1.12.0-paymentservice
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: service
          livenessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: paymentservice-config
            - secretRef:
                name: paymentservice-secret
          resources:
            requests:
              cpu: "50m"
              memory: "60Mi"
            limits:
              cpu: "100m"
              memory: "120Mi"
apiVersion: v1
kind: ConfigMap
metadata:
  name: emailservice-config
data:
  OTEL_COLLECTOR_NAME: "opentelemetry-demo-otelcol"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://opentelemetry-demo-otelcol:4318/v1/traces"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=emailservice,service.namespace=opentelemetry-demo,service.version=1.12.0"
  EMAIL_SERVICE_PORT: "8080"
  APP_ENV: "production"

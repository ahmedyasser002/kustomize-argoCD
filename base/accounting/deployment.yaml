apiVersion: apps/v1
kind: Deployment
metadata:
  name: accountingservice
  labels:
    app: accountingservice
    app.kubernetes.io/version: "1.12.0"
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: accountingservice
  template:
    metadata:
      labels:
        app: accountingservice
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:latest
          command:
            - sh
            - -c
            - until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;
      containers:
        - name: accountingservice
          image: ghcr.io/open-telemetry/demo:1.12.0-accountingservice
          imagePullPolicy: IfNotPresent
          env:
            - name: OTEL_SERVICE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app']
          envFrom:
            - configMapRef:
                name: accountingservice-config   
            - secretRef:
                name: accountingservice-secret
          resources:
            requests:
              cpu: "50m"
              memory: "60Mi"
            limits:
              cpu: "100m"
              memory: "120Mi"
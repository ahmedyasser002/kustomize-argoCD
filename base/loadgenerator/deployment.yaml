apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgenerator
  labels:
    app: loadgenerator
    app.kubernetes.io/version: "1.12.0"
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: loadgenerator
  template:
    metadata:
      labels:
        app: loadgenerator
    spec:
      containers:
        - name: loadgenerator
          image: ghcr.io/open-telemetry/demo:1.12.0-loadgenerator
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
              name: service
          envFrom:
            - configMapRef:
                name: loadgenerator-config
          resources:
            requests:
              cpu: "200m"
              memory: "750Mi"
            limits:
              cpu: "500m"
              memory: "1500Mi"
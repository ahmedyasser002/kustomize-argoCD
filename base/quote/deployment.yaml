apiVersion: apps/v1
kind: Deployment
metadata:
  name: quoteservice
  labels:
    app: quoteservice
    app.kubernetes.io/version: "1.12.0"
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: quoteservice
  template:
    metadata:
      labels:
        app: quoteservice
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 33
        runAsGroup: 33
      containers:
        - name: quoteservice
          image: ghcr.io/open-telemetry/demo:1.12.0-quoteservice
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: service
          envFrom:
            - configMapRef:
                name: quoteservice-config
          resources:
            requests:
              cpu: "50m"
              memory: "20Mi"
            limits:
              cpu: "100m"
              memory: "40Mi"
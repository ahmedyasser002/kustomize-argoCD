apiVersion: v1
kind: ConfigMap
metadata:
  name: quoteservice-config
data:
  OTEL_SERVICE_NAME: "quoteservice"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-demo-otelcol:4318"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=quoteservice,service.namespace=opentelemetry-demo,service.version=1.12.0"
  QUOTE_SERVICE_PORT: "8080"
  OTEL_PHP_AUTOLOAD_ENABLED: "true"
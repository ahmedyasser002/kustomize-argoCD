apiVersion: v1
kind: ConfigMap
metadata:
  name: shippingservice-config
data:
  OTEL_SERVICE_NAME: "shippingservice"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-demo-otelcol:4317"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=shippingservice,service.namespace=opentelemetry-demo,service.version=1.12.0"
  SHIPPING_SERVICE_PORT: "8080"
  QUOTE_SERVICE_ADDR: "http://quoteservice:8080"
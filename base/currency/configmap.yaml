apiVersion: v1
kind: ConfigMap
metadata:
  name: currencyservice-config
data:
  OTEL_COLLECTOR_NAME: "opentelemetry-demo-otelcol"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-demo-otelcol:4317"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=currencyservice,service.namespace=opentelemetry-demo,service.version=1.12.0"
  CURRENCY_SERVICE_PORT: "8080"
  VERSION: "1.12.0"

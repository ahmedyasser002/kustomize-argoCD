apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  OTEL_SERVICE_NAME: "frontend"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-demo-otelcol:4317"
  OTEL_COLLECTOR_HOST: "opentelemetry-demo-otelcol"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=frontend,service.namespace=opentelemetry-demo,service.version=1.12.0"
  FRONTEND_PORT: "8080"
  FRONTEND_ADDR: ":8080"
  AD_SERVICE_ADDR: "adservice:8080"
  CART_SERVICE_ADDR: "cartservice:8080"
  CHECKOUT_SERVICE_ADDR: "checkoutservice:8080"
  CURRENCY_SERVICE_ADDR: "currencyservice:8080"
  PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:8080"
  RECOMMENDATION_SERVICE_ADDR: "recommendationservice:8080"
  SHIPPING_SERVICE_ADDR: "shippingservice:8080"
  FLAGD_HOST: "flagd"
  FLAGD_PORT: "8013"
  WEB_OTEL_SERVICE_NAME: "frontend-web"
  PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://localhost:8080/otlp-http/v1/traces"
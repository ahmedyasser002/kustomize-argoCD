apiVersion: v1
kind: ConfigMap
metadata:
  name: adservice-config
data:
  OTEL_COLLECTOR_NAME: "opentelemetry-demo-otelcol"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-demo-otelcol:4318"
  OTEL_LOGS_EXPORTER: "otlp"
  AD_SERVICE_PORT: "8080"
  FLAGD_HOST: "opentelemetry-demo-flagd"
  FLAGD_PORT: "8013"
  OTEL_SERVICE_NAME: "adservice"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=adservice,service.namespace=opentelemetry-demo,service.version=1.12.0"
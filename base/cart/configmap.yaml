apiVersion: v1
kind: ConfigMap
metadata:
  name: cartservice-config
data:
  OTEL_SERVICE_NAME: "cartservice"
  OTEL_COLLECTOR_NAME: "opentelemetry-demo-otelcol"
  OTEL_EXPORTER_OTLP_METRICS_TEMPORALITY_PREFERENCE: "cumulative"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://opentelemetry-demo-otelcol:4317"
  OTEL_RESOURCE_ATTRIBUTES: "service.name=cartservice,service.namespace=opentelemetry-demo,service.version=1.12.0"
  OTEL_LOGS_EXPORTER: "otlp"
  CART_SERVICE_PORT: "8080"
  ASPNETCORE_URLS: "http://*:8080"
  VALKEY_ADDR: "valkey:6379"
  FLAGD_HOST: "opentelemetry-demo-flagd"
  FLAGD_PORT: "8013"
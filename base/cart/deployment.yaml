apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  labels:
    app: cartservice
    app.kubernetes.io/version: "1.12.0"
    app.kubernetes.io/part-of: opentelemetry-demo
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
    spec:
      initContainers:
        - name: wait-for-valkey
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              RETRIES=0
              MAX_RETRIES=30
              until nc -z valkey 6379; do
                RETRIES=$((RETRIES + 1))
                if [ $RETRIES -eq $MAX_RETRIES ]; then
                  echo "Valkey not available after $MAX_RETRIES attempts. Giving up."
                  exit 1
                fi
                echo "Waiting for Valkey... attempt $RETRIES/$MAX_RETRIES"
                sleep 5
              done
              echo "Valkey is ready!"
      containers:
        - name: cartservice
          image: ghcr.io/open-telemetry/demo:1.12.0-cartservice
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: service
          livenessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: cartservice-config
          resources:
            requests:
              cpu: "100m"
              memory: "80Mi"
            limits:
              cpu: "200m"
              memory: "160Mi"

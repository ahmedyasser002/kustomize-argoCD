apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-dev
  namespace: argocd
  labels:
    env: dev
spec:
  project: default
  source:
    repoURL: https://github.com/ahmedyasser002/kustomize-argoCD.git
    targetRevision: main
    path: ../overlays/dev          
  destination:
    server: https://kubernetes.default.svc
    namespace: dev             
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false   